name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter @aetheros/types typecheck
      - run: pnpm --filter @aetheros/web typecheck

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          echo "setuptools<70.0.0" > /tmp/constraints.txt
          export PIP_CONSTRAINT=/tmp/constraints.txt
          cd apps/api
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt
      - name: Install test deps
        run: pip install pytest prometheus-client python-jose
      - name: Syntax check
        run: python -m py_compile apps/api/main.py
      - name: Unit tests
        run: PYTHONPATH=apps/api python -m pytest tests/ -q
